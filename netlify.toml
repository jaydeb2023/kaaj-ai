**তারপর Netlify dashboard এ যান:**
```
https://app.netlify.com/sites/kaaj/configuration/deploys
```

→ **Build settings** → **Edit settings**
→ **Build command** পরিবর্তন করুন:
```
npm run build
```
→ **Publish directory:**
```
.next
```
→ **Save** ✅

→ **Deploys** → **Trigger deploy** → **Clear cache and deploy site** click করুন

